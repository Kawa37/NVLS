<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>File Reader App</title>
    <link rel="stylesheet" href="chaps.css" />
    <link rel="stylesheet" href="./all.min.css" />

    <link rel="icon" type="image/png" href="../ss_web_logo.png" />
  </head>
  <body>
    <div class="top-bar">
      <h1 id="title">Shadow Slave</h1>
      <button id="resetBtn">
        <i class="fa-solid fa-arrows-rotate"></i>
      </button>
    </div>

    <div id="btn-container" class="container"></div>

    <div class="bottom-bar">
      <button id="backBtn">
        <i class="fa-solid fa-bars-staggered"></i>
      </button>
      <button id="readBtn">
        <i class="fa-solid fa-play"></i>
        <span id="readBtnT">Read</span>
      </button>
      <button id="backBtn-r">
        <i class="fa-solid fa-bars-staggered"></i>
      </button>
    </div>
    <script type="module" src="chaps.js"></script>
  </body>
</html>
